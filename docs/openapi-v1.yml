                        code: live
                        message: Only 4 left!
                        stock_left: 4
                      ready_at: '2026-06-17T19:00:00Z'
                      cook_date: null
                      delivery_window: ''
                    next: null
                    previous: null
                  summary: Category drops
          description: ''
  /api/v1/checkout/abandon:
    post:
      operationId: v1_checkout_abandon_create
      summary: Abandon checkout (no-op)
      tags:
      - Checkout
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/checkout/quote:
    get:
      operationId: v1_checkout_quote_retrieve
      description: Totals + ETA + payment options for the chef's lines to a given
        address. Error `out_of_zone` (400) if the kitchen doesn't deliver there.
      summary: Quote one chef's group
      parameters:
      - in: query
        name: address_id
        schema:
          type: integer
        required: true
      - in: query
        name: chef_id
        schema:
          type: integer
        required: true
      tags:
      - Checkout
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteResponse'
              examples:
                Quote:
                  value:
                    chef_id: 412
                    currency: NGN
                    subtotal: '9000.00'
                    delivery_fee: '700.00'
                    service_fee: '450.00'
                    total: '10150.00'
                    eta_window: 45–60 min
                    address:
                      id: 88
                      label: home
                      line1: 12B Admiralty Way
                      area: Lekki Phase 1
                      city: Lagos
                      lat: 6.44
                      lng: 3.48
                    payment_options:
                    - method: wallet
                      balance: '12300.00'
                      sufficient: true
                    - method: card
                      cards:
                      - id: 3
                        brand: visa
                        last4: '4081'
                        exp: 09/27
                    - method: new_card
                    - method: transfer
          description: ''
  /api/v1/checkout/resume/{reference}:
    get:
      operationId: v1_checkout_resume_retrieve
      description: |-
        Poll a hosted (card/transfer) payment (C-27). Placed → 201 order;
        still pending → 200 {status:pending}; failed → 400.
      summary: Poll a hosted (card/transfer) payment
      parameters:
      - in: path
        name: reference
        schema:
          type: string
        required: true
      tags:
      - Checkout
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitResponse'
              examples:
                Placed:
                  value:
                    order:
                      number: HC-100042
                      status: Placed
          description: ''
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumePending'
              examples:
                StillPending:
                  value:
                    status: pending
                  summary: Still pending
          description: ''
  /api/v1/checkout/shipping-methods:
    get:
      operationId: v1_checkout_shipping_methods_list
      description: Repository-parity payload for a chef+address (one method at MVP).
      summary: Shipping methods for a chef+address
      parameters:
      - in: query
        name: address_id
        schema:
          type: integer
        required: true
      - in: query
        name: chef_id
        schema:
          type: integer
        required: true
      tags:
      - Checkout
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ShippingMethods'
              examples:
                RiderDelivery:
                  value:
                  - - code: rider-delivery
                      name: Rider delivery
                      charge:
                        currency: NGN
                        incl_tax: '700.00'
                  summary: Rider delivery
          description: ''
  /api/v1/checkout/submit:
    post:
      operationId: v1_checkout_submit_create
      description: The one placement path. Send `Idempotency-Key` to make retries
        safe. Wallet/card place immediately (201); new_card/transfer return a gateway
        action to complete (200) — then poll `GET /checkout/resume/{reference}`.
      summary: Place the order (single chef)
      tags:
      - Checkout
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Submit'
            examples:
              Wallet:
                value:
                  chef_id: 412
                  address_id: 88
                  payment:
                    method: wallet
              NewCard(redirect):
                value:
                  chef_id: 412
                  address_id: 88
                  payment:
                    method: new_card
                summary: New card (redirect)
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Submit'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Submit'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitResponse'
              examples:
                Placed:
                  value:
                    order:
                      number: HC-100042
                      status: Placed
                      total:
                        currency: NGN
                        incl_tax: '10150.00'
                    remaining_basket_groups: 0
          description: ''
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentActionResponse'
              examples:
                GatewayAction:
                  value:
                    payment_action:
                      type: paystack
                      authorization_url: https://checkout.paystack.com/abc
                      reference: HC-100042
                  summary: Gateway action
          description: ''
  /api/v1/chef/analytics:
    get:
      operationId: v1_chef_analytics_retrieve
      description: '`?range=7d|30d|90d`.'
      summary: Sales analytics
      parameters:
      - in: query
        name: range
        schema:
          enum:
          - 7d
          - 30d
          - 90d
          type: string
          default: 7d
          minLength: 1
        description: |-
          * `7d` - 7d
          * `30d` - 30d
          * `90d` - 90d
      tags:
      - Chef
      security:
      - jwtAuth: []
      responses:
