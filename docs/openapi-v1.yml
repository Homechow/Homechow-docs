                        avatar: null
                        kitchen_area: Lekki Phase 1
                        rating_avg: '4.80'
                        rating_count: 214
                        follower_count: 1843
                        kitchen_open: true
                        is_following: false
                      dish:
                        id: 311
                        title: Smoky Party Jollof
                        description: Smoky, generous, party-style.
                        photo: null
                        dietary:
                        - Spicy
                        cuisine:
                        - Nigerian
                        portion_size: Serves 1–2
                        prep_minutes: 45
                        ingredients: Rice, tomato, goat meat
                      price:
                        currency: NGN
                        excl_tax: '4500.00'
                        incl_tax: '4500.00'
                        is_tax_known: true
                      availability:
