openapi: 3.0.3
info:
  title: HomeChow API
  version: 1.0.0
  description: |-
    Three-sided on-demand food-delivery marketplace.

    ### Authenticating to try requests
    Auth is phone-OTP → JWT. The fastest path in dev:

    1. `POST /api/v1/auth/dev-token` with `{"role": "customer"}` (also `chef`/`rider`)  **DEBUG only**  to mint a JWT in one step.
    2. Click **Authorize** (top right) and paste the `access` token.

    Or do it the real way: `POST /auth/otp/request`, then `/auth/otp/verify` with code `000000` (dev), and authorize with the returned `access` token.

    Money is always the `{currency, excl_tax, incl_tax, is_tax_known}` shape; errors are `{code, detail, extra}`.
paths:
  /api/v1/auth/dev-token:
    post:
      operationId: v1_auth_dev_token_create
      description: Developer convenience so you can **Authorize** the docs UI in one
        step. Creates the user (and an active chef/rider profile) if needed. Returns
        403 when `DEBUG` is off — never available in production.
      summary: Mint a JWT for a role (DEBUG only)
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DevToken'
            examples:
              AsAChef:
                value:
                  role: chef
                summary: As a chef
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DevToken'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DevToken'
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DevTokenResponse'
              examples:
                Token:
                  value:
                    access: eyJhbG…
                    refresh: eyJhbG…
                    role: chef
                    phone: '+2348000009001'
          description: ''
  /api/v1/auth/login:
    post:
      operationId: v1_auth_login_create
      description: Password login. `identifier` is the phone (E.164) or the email.
        Requires a password to have been set (POST /auth/set-password). Phone users
        without a password keep using the OTP flow.
      summary: Log in with phone or email + password
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'
            examples:
              ByEmail:
                value:
                  identifier: ada@example.com
                  password: s3cret-pass
                summary: By email
              ByPhone:
                value:
                  identifier: '+2348012345678'
                  password: s3cret-pass
                summary: By phone
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Login'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Login'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessRefresh'
          description: ''
  /api/v1/auth/logout:
    post:
      operationId: v1_auth_logout_create
      summary: Log out (blacklist refresh token)
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Logout'
            examples:
              Logout:
                value:
                  refresh: eyJhbG…
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Logout'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Logout'
        required: true
      security:
      - jwtAuth: []
      responses:
        '205':
          description: No response body
  /api/v1/auth/otp/request:
    post:
      operationId: v1_auth_otp_request_create
      description: '`identifier` is a phone (E.164 → SMS) or an email (→ email code).
        An email code is only sent to an account that already uses that email (phone
        is the account identity — no email-only signup).'
      summary: Request a one-time code
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OTPRequest'
            examples:
              ByPhone:
                value:
                  identifier: '+2348012345678'
                  purpose: login
                summary: By phone
              ByEmail:
                value:
                  identifier: ada@example.com
                  purpose: login
                summary: By email
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OTPRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OTPRequest'
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OTPRequestResponse'
              examples:
                Sent:
                  value:
                    resend_after: 30
          description: ''
  /api/v1/auth/otp/verify:
    post:
      operationId: v1_auth_otp_verify_create
      description: 'Verify a code sent to a phone or email (`identifier`). A new account
        is created only on the first verify of an unknown **phone** (`is_new_user:
        true`) — email verify logs in an existing account. In dev the code is `000000`.
        An optional `email` is captured on a phone signup when present.'
      summary: Verify a code → JWT pair
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OTPVerify'
            examples:
              ByPhone:
                value:
                  identifier: '+2348012345678'
                  code: '000000'
                  purpose: login
                summary: By phone
              ByEmail:
                value:
                  identifier: ada@example.com
                  code: '000000'
                summary: By email
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OTPVerify'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OTPVerify'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
              examples:
                Tokens:
                  value:
                    access: eyJhbG…
                    refresh: eyJhbG…
                    is_new_user: false
          description: ''
  /api/v1/auth/set-password:
    post:
      operationId: v1_auth_set_password_create
      description: Authenticated. Sets a usable password so the account can use `POST
        /auth/login`. Pass an `email` to also enable email login.
      summary: Set a password (and optional email) to enable password login
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetPassword'
            examples:
              AddEmail+Password:
                value:
                  email: ada@example.com
                  password: s3cret-pass
                summary: Add email + password
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SetPassword'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SetPassword'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/token/refresh:
    post:
      operationId: v1_auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/v1/basket:
    get:
      operationId: v1_basket_retrieve
      description: Creates an empty basket if none is open. Each group carries a per-chef
        delivery estimate (when a default address exists) and the service fee.
      summary: Get the cart (grouped by chef)
      tags:
