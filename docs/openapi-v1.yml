  /api/v1/basket/groups/{chef_id}:
    delete:
      operationId: v1_basket_groups_destroy
      summary: Remove a whole kitchen from the cart
      parameters:
      - in: path
        name: chef_id
        schema:
          type: integer
        required: true
      tags:
      - Basket
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/basket/lines:
    post:
      operationId: v1_basket_lines_create
