components:
  schemas:
    AccessRefresh:
      type: object
      properties:
        access:
          type: string
        refresh:
          type: string
      required:
      - access
      - refresh
    AddLine:
      type: object
      properties:
        drop_id:
          type: integer
          minimum: 1
        quantity:
          type: integer
          minimum: 1
          default: 1
      required:
      - drop_id
    Address:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        label:
          $ref: '#/components/schemas/LabelEnum'
        line1:
          type: string
          maxLength: 255
        area:
          type: string
          maxLength: 120
        city:
          type: string
          maxLength: 120
        apartment:
          type: string
          maxLength: 120
        floor:
          type: string
          maxLength: 64
        landmark:
          type: string
          maxLength: 255
        phone_override:
          type: string
          pattern: ^\+[1-9]\d{6,14}$
        is_default:
          type: boolean
        lat:
